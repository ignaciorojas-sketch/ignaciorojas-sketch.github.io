# =============================================================================
# CONFIGURACIÓN GENERAL
# =============================================================================
locale           : "es-ES"
site_theme       : "contrast"
title            : "GeoScientist"
title_separator  : "-"
name             : "Ignacio Rojas-Rubio"
description      : "Espacio de difusión de la geografía crítica, la filosofía política y la música urbana desde el puerto olvidado de Valparaíso, Chile."
url              : "https://ignaciorojas-sketch.github.io"
baseurl          : ""
repository       : "ignaciorojas-sketch/ignaciorojas-sketch.github.io"

# =============================================================================
# PERFIL DEL AUTOR (Sidebar)
# =============================================================================
author:
  avatar           : "profile.png"
  name             : "Ignacio Rojas-Rubio"
  pronouns         : "Dr."  
  bio              : "Investigador en geografía crítica, docente en la Universidad de Playa Ancha (Profe Nacho) y selector de vinilos (GEO). Pensando el espacio y habitando el sonido como un 'Scientist of Dub'."
  location         : "Valparaíso-Chile"
  employer         : "Universidad de Playa Ancha - Valparaíso, Chile"
  uri              : "https://ignaciorojas-sketch.github.io"
  email            : "ignacio.rojas@upla.cl" 

  # Redes Científicas
  googlescholar    : "https://share.google/wu2s3Xk1q2yfFZn62"
  orcid            : "https://orcid.org/0000-0001-5003-141X?lang=es"
  scopus           : "https://www.scopus.com/authid/detail.uri?authorId=57204360068"
  github           : "ignaciorojasgeo"

  # Redes de Difusión y Música
  instagram        : "geo.selektor"
  soundcloud       : "geoselector"
  youtube          : "@ignaciorojasgeo"
  applemusic       : "@irojas_rubio"

# =============================================================================
# COLECCIONES PERSONALIZADAS (Collections)
# =============================================================================
collections:
  publications:
    output: true
    permalink: /publications/:path/
  pasantias:
    output: true
    permalink: /pasantias/:path/
  terreno:
    output: true
    permalink: /terreno/:path/
  musica:
    output: true
    permalink: /musica/:path/

# =============================================================================
# CATEGORÍAS PARA LA SECCIÓN DE PUBLICACIONES ACADÉMICAS
# =============================================================================
publication_category:
  books:
    title: 'Libros'
  chapters:
    title: 'Capítulos de Libros'
  manuscripts:
    title: 'Artículos Científicos'    
  conferences:
    title: 'Ponencias y Congresos'

# =============================================================================
# AJUSTES DE COMPILACIÓN Y CONFIGURACIÓN GENERAL
# =============================================================================
teaser           : 
breadcrumbs      : true
words_per_minute : 160
future           : true
read_more        : "disabled"
talkmap_link     : false

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "single"
      author_profile: true
      read_time: true
      comments: true
      share: true
  - scope:
      path: ""
      type: "publications"
    values:
      layout: "single"
      author_profile: true
  - scope:
      path: ""
      type: "terreno"
    values:
      layout: "single"
      author_profile: true
  - scope:
      path: ""
      type: "musica"
    values:
      layout: "single"
      author_profile: true

comments:
  provider       : false

# Motor de compilación nativo para GitHub Pages (Sin plugins conflictivos)
safe: false
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-include-cache
