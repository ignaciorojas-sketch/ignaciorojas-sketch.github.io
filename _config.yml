```yaml
# =============================================================================
# CONFIGURACIÓN GENERAL
# =============================================================================
locale                   : "es-ES"
site_theme               : "contrast"
title                    : "GeoScientist"
title_separator          : "-"
name                     : &name "Ignacio Rojas-Rubio"
description              : &description "Espacio de difusión de la geografía crítica, la filosofía política y la música urbana desde el puerto olvidado de Valparaíso, Chile."
url                      : "https://ignaciorojasgeo.github.io"
baseurl                  : ""
repository               : "ignaciorojasgeo/ignaciorojasgeo.github.io"

# =============================================================================
# PERFIL DEL AUTOR (Sidebar)
# =============================================================================
author:
  avatar           : "profile.png"
  name             : "Ignacio Rojas-Rubio"
  pronouns         : "Dr."  
  bio              : "Investigador en geografía crítica, docente en la Universidad de Playa Ancha (Profe Nacho) y selector de vinilos (GEO). Pensando el espacio y habitando el sonido como un 'Scientist of Dub'."
  location         : "Valparaíso-Chile"
  employer         : "Universidad de Playa Ancha - Valparaíso, Chile"
  uri              : "https://ignaciorojasgeo.github.io"
  email            : "ignacio.rojas@upla.cl" 

  # Redes Científicas
  googlescholar    : "https://share.google/wu2s3Xk1q2yfFZn62"
  orcid            : "https://orcid.org/0000-0001-5003-141X?lang=es"
  scopus           : "https://www.scopus.com/authid/detail.uri?authorId=57204360068"
  github           : "ignaciorojasgeo"

  # Redes de Difusión y Música
  instagram        : ["@profe_nacho_upla", "@geo.selektor"]
  soundcloud       : "https://soundcloud.com/geoselector"
  youtube          : "@ignaciorojasgeo"
  Applemusic       : "@irojas_rubio"

# =============================================================================
# COLECCIONES PERSONALIZADAS (Collections)
# =============================================================================
# Definimos las secciones de contenido estructurado e independiente del blog.
collections:
  publications:
    output: true
    permalink: /publications/:path/
  pasantias:
    output: true
    permalink: /pasantias/:path/
  terreno:
    output: true
    permalink: /terreno/:path/
  musica:
    output: true
    permalink: /musica/:path/

# =============================================================================
# CATEGORÍAS PARA LA SECCIÓN DE PUBLICACIONES ACADÉMICAS
# =============================================================================
publication_category:
  books:
    title: 'Libros'
  chapters:
    title: 'Capítulos de Libros'
  manuscripts:
    title: 'Artículos Científicos'    
  conferences:
    title: 'Ponencias y Congresos'

# =============================================================================
# AJUSTES DE COMPILACIÓN Y CONFIGURACIÓN GENERAL
# =============================================================================
teaser                   : 
breadcrumbs              : true
words_per_minute         : 160
future                   : true
read_more                : "disabled"
talkmap_link             : false

defaults:
  # Valores por defecto para el blog posts
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "single"
      author_profile: true
      read_time: true
      comments: true
      share: true
  # Valores por defecto para publicaciones académicas
  - scope:
      path: ""
      type: "publications"
    values:
      layout: "single"
      author_profile: true
  # Valores por defecto para trabajo en terreno y fotos
  - scope:
      path: ""
      type: "terreno"
    values:
      layout: "single"
      author_profile: true
  # Valores por defecto para música y vinilos
  - scope:
      path: ""
      type: "musica"
    values:
      layout: "single"
      author_profile: true

comments:
  provider               : false
staticman:
  allowedFields          : ['name', 'email', 'url', 'message']
  branch                 : "gh-pages"
  commitMessage          : "Nuevo comentario."
  filename               : comment-{@timestamp}
  format                 : "yml"


